<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - Inshuti y’umubyeyi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'Her/home.css' %}">
</head>
<body>
  <div class="main-content" style="height: 700px;">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Inshuti Y'Umuryango</a>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="Home">Home</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="content" style="margin: 3rem auto; max-width: 400px;">
      <form method="POST" action="/Register">
        {% csrf_token %}
        {{ form.as_p }}
        <p><input type="text" name="userame" placeholder="userame" class="form-control" required></p>
        <p><input type="text" name="Email" placeholder="Email" class="form-control" required></p>
        <p><input type="password" name="password" placeholder="Password" class="form-control" required></p>
        <p><input type="password" name="confirm_password" placeholder="Confirm Password" class="form-control" required></p>
        <p><button type="submit" class="btn btn-primary">Register</button></p>
      </form>

      <div class="login-link">
        Already have an account? <a href="Login" style="color:#2ec4b6;">Login</a>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-links">
      <a href="Privacy">privacy policy</a>
        <a href="Blogs">Blogs</a>
      <a href="terms.html">Terms and conditions</a>
    </div>
    <div class="footer-contact">
      <div>
        <strong>contact us</strong><br>
        Phone<br>
        250 783 456 890<br>
        Address<br>
        KN 12 ave
      </div>
      <div>
        <strong>Email</strong><br>
        Inshuti@Umubyeyi.com<br>
        <div class="footer-social">
          <strong>Social</strong><br>
          <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook"></a>
          <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733558.png" alt="Instagram"></a>
          <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" alt="Twitter"></a>
        </div>
      </div>
    </div>
    <div class="footer-copyright">
      Inshuti Yumubyeyi © 2025 All Rights Reserved.
    </div>
  </div>
</body>
</html>
